<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/png" href="/favicon.png" />
  <title>AURA — Symptom Assessment</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            sans: ['"Bricolage Grotesque"', 'system-ui', 'sans-serif'],
            display: ['"Bricolage Grotesque"', 'system-ui', 'sans-serif'],
            mono: ['"JetBrains Mono"', 'monospace'],
          },
          colors: {
            border: "hsl(var(--border))",
            input: "hsl(var(--input))",
            ring: "hsl(var(--ring))",
            background: "hsl(var(--background))",
            foreground: "hsl(var(--foreground))",
            primary: {
              DEFAULT: "hsl(var(--primary))",
              foreground: "hsl(var(--primary-foreground))",
            },
            secondary: {
              DEFAULT: "hsl(var(--secondary))",
              foreground: "hsl(var(--secondary-foreground))",
            },
            muted: {
              DEFAULT: "hsl(var(--muted))",
              foreground: "hsl(var(--muted-foreground))",
            },
            accent: {
              DEFAULT: "hsl(var(--accent))",
              foreground: "hsl(var(--accent-foreground))",
            },
            card: {
              DEFAULT: "hsl(var(--card))",
              foreground: "hsl(var(--card-foreground))",
            },
            destructive: {
              DEFAULT: "hsl(var(--destructive))",
              foreground: "hsl(var(--destructive-foreground))",
            },
            warning: {
              DEFAULT: "hsl(var(--warning))",
              foreground: "hsl(var(--warning-foreground))",
            },
            // Dark "ink" surface used for the nav CTA, trust strip,
            // consultant panel, and profile ID card.
            ink: {
              DEFAULT: "hsl(var(--ink))",
              foreground: "hsl(var(--ink-foreground))",
            },
            "teal-bright": "hsl(var(--teal-bright))",
          },
          borderRadius: {
            sm: "0.625rem",   // 10px — inner controls
            md: "0.875rem",   // 14px — inputs
            lg: "1.375rem",   // 22px — small cards
            xl: "1.625rem",   // 26px — cards
            "2xl": "1.75rem", // 28px — large panels
          },
          boxShadow: {
            soft: "var(--shadow-soft)",
            "soft-lg": "var(--shadow-soft-lg)",
            teal: "var(--shadow-teal)",
          },
        }
      }
    }
  </script>
  <link
    href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,500;12..96,600;12..96,700;12..96,800&family=JetBrains+Mono:wght@400;500;700&display=swap"
    rel="stylesheet">
  <style>
    :root {
      /* Soft App — warm cream paper, teal signal, warm ink */
      --background: 36 33% 97%;
      /* #FAF8F5 */
      --foreground: 24 10% 10%;
      /* #1C1917 */
      --card: 0 0% 100%;
      --card-foreground: 24 10% 10%;
      --popover: 0 0% 100%;
      --popover-foreground: 24 10% 10%;
      --primary: 173 79% 26%;
      /* #0E7569 teal */
      --primary-foreground: 36 33% 97%;
      --secondary: 30 10% 94%;
      --secondary-foreground: 24 10% 12%;
      --muted: 30 10% 94%;
      --muted-foreground: 24 6% 40%;
      --accent: 173 79% 26%;
      --accent-foreground: 36 33% 97%;
      --destructive: 0 72% 51%;
      /* #DC2626 */
      --destructive-foreground: 0 0% 100%;
      --warning: 32 92% 44%;
      /* #D97706 amber */
      --warning-foreground: 0 0% 100%;
      --ink: 24 10% 10%;
      /* #1C1917 raised dark surface */
      --ink-foreground: 36 33% 97%;
      --teal-bright: 168 76% 64%;
      /* #5EEAD4 accent on ink */
      --border: 30 10% 89%;
      --input: 30 10% 86%;
      --ring: 173 79% 26%;
      --radius: 1.625rem;
      --shadow-soft: 0 6px 20px -10px rgba(28, 25, 23, 0.12);
      --shadow-soft-lg: 0 14px 40px -16px rgba(28, 25, 23, 0.18);
      --shadow-teal: 0 16px 36px -12px rgba(14, 117, 105, 0.5);
    }

    .dark {
      /* Soft App — warm charcoal, brighter teal that keeps popping */
      --background: 24 10% 8%;
      --foreground: 36 25% 94%;
      --card: 24 8% 12%;
      --card-foreground: 36 25% 94%;
      --popover: 24 8% 12%;
      --popover-foreground: 36 25% 94%;
      --primary: 172 62% 38%;
      --primary-foreground: 36 33% 97%;
      --secondary: 24 8% 18%;
      --secondary-foreground: 36 20% 90%;
      --muted: 24 8% 18%;
      --muted-foreground: 36 10% 62%;
      --accent: 170 66% 46%;
      --accent-foreground: 24 10% 8%;
      --destructive: 0 74% 58%;
      --destructive-foreground: 0 0% 100%;
      --warning: 32 88% 52%;
      --warning-foreground: 24 10% 8%;
      --ink: 24 8% 16%;
      /* lifted warm panel, reads distinct from card */
      --ink-foreground: 36 25% 94%;
      --teal-bright: 168 76% 64%;
      --border: 30 8% 22%;
      --input: 30 8% 25%;
      --ring: 170 66% 46%;
      --shadow-soft: 0 6px 20px -10px rgba(0, 0, 0, 0.55);
      --shadow-soft-lg: 0 14px 40px -16px rgba(0, 0, 0, 0.65);
      --shadow-teal: 0 16px 36px -12px rgba(20, 160, 141, 0.45);
    }

    body {
      font-family: 'Bricolage Grotesque', system-ui, sans-serif;
      background: hsl(var(--background));
      color: hsl(var(--foreground));
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }

    * {
      box-sizing: border-box;
    }

    ::-webkit-scrollbar {
      width: 6px;
      height: 0px;
    }

    ::-webkit-scrollbar-thumb {
      background: hsl(var(--foreground) / 0.15);
      border-radius: 3px;
    }

    ::selection {
      background: hsl(var(--accent));
      color: hsl(var(--accent-foreground));
    }

    input::placeholder,
    textarea::placeholder {
      color: hsl(var(--foreground) / 0.35);
    }

    .font-mono {
      font-family: 'JetBrains Mono', monospace;
    }

    .tabular-nums {
      font-variant-numeric: tabular-nums;
    }

    .shadow-soft {
      box-shadow: var(--shadow-soft);
    }

    .shadow-soft-lg {
      box-shadow: var(--shadow-soft-lg);
    }

    .shadow-teal {
      box-shadow: var(--shadow-teal);
    }

    /* Mono micro-label: uppercase, tracked, small */
    .label {
      font-family: 'JetBrains Mono', monospace;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      font-size: 0.6875rem;
      font-weight: 600;
    }

    /* --- Motion --- */
    @keyframes riseIn {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes cardIn {
      from { opacity: 0; transform: translateY(22px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes popIn {
      0% { opacity: 0; transform: scale(0.85); }
      70% { transform: scale(1.04); }
      100% { opacity: 1; transform: scale(1); }
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.35; }
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }

    @keyframes bounceDot {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-5px); }
    }

    @keyframes ecgDash {
      from { stroke-dashoffset: 400; }
      to { stroke-dashoffset: 0; }
    }

    @keyframes sweep {
      from { width: 0%; }
    }

    @keyframes breathe {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.06); }
    }

    .anim-rise { animation: riseIn 0.7s cubic-bezier(0.22, 1, 0.36, 1) both; }
    .anim-card { animation: cardIn 0.7s cubic-bezier(0.22, 1, 0.36, 1) both; }
    .anim-pop { animation: popIn 0.5s cubic-bezier(0.22, 1, 0.36, 1) both; }
    .anim-breathe { animation: breathe 5s ease-in-out infinite; }
    .blink { animation: blink 1s step-end infinite; }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
      }
    }
  </style>

</head>

<body>
  <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>

</html>
