version: '3.8'

services:
  server:
    build: ./server
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - MONGO_URI=${MONGO_URI}
      - JWT_SECRET=${JWT_SECRET}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    restart: always

  client:
    build: ./client
    ports:
      - "3000:80"
    depends_on:
      - server
    restart: always

# Note: Local environment variables should be in a root .env or passed via CLI
